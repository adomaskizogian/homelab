# Auto-Install
d-i debconf/priority select critical
d-i auto-install/enable boolean true

# Localization & Language
d-i debian-installer/language string en
d-i debian-installer/country string LT
d-i debian-installer/locale string en_US.UTF-8

# Network 
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string central-neurosis-unit
d-i netcfg/get_domain string null

# Mirror 
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/suite string trixie
d-i mirror/codename string trixie

# User and Password
d-i passwd/root-login boolean false
d-i passwd/make-user boolean true
d-i passwd/user-uid string 1000
d-i passwd/user-fullname string fragmented-agent
d-i passwd/username string fragmented-agent
d-i passwd/user-password-crypted password !

# Clock and Timezone
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Vilnius
d-i clock-setup/ntp boolean true

# Apt 
d-i apt-setup/cdrom/set-first boolean false
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/services-select multiselect security, updates
d-i apt-setup/security_host string security.debian.org

# Partitioning
d-i partman-auto/disk string /dev/nvme0n1
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select boot-root

d-i partman-partitioning/choose_label string gpt

d-i partman-auto/expert_recipe string                         \
      boot-root ::                                            \
              538 538 1075 fat32                              \
                      $primary{ }                             \
                      method{ efi } format{ }                 \
                      mountpoint{ /boot/efi }                 \
              .                                               \
              1000 10000 -1 ext4                              \
                      $primary{ }                             \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ ext4 }    \
                      mountpoint{ / }                         \
              .

d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

d-i partman-efi/non_efi_system boolean false

# spent HOURS troubleshooting why install freezes only to discover
# partman goes into an infinite loop
# https://bugs-devel.debian.org/cgi-bin/bugreport.cgi?bug=1108631
# > partman-basicfilesystems/no_swap should be *false* to confirm that you
# > do not want to use swap.
d-i partman-basicfilesystems/no_swap boolean false
d-i partman-basicfilesystems/confirm_no_swap boolean true

# Boot Loader
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

# Package Selection
tasksel tasksel/first multiselect ssh-server
d-i pkgsel/include string sudo
d-i pkgsel/install-language-support boolean false
popularity-contest popularity-contest/participate boolean false
d-i pkgsel/update-policy select none

# Late Command
d-i preseed/late_command string \
    cp /cdrom/post-install.sh /target/tmp/post-install.sh; \
    in-target chmod 700 /tmp/post-install.sh; \
    in-target /tmp/post-install.sh; \
    in-target rm /tmp/post-install.sh

# Finalization
d-i finish-install/reboot_in_progress note
